services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: deem
      POSTGRES_PASSWORD: deem
      POSTGRES_DB: deem
    ports:
      - "5432:5432"
    volumes:
      - deem_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  deem_pg:
